services:
  postgres:
    image: postgres:15-alpine
    container_name: agenda_postgres
    restart: always
    environment:
      POSTGRES_USER: agenda_user
      POSTGRES_PASSWORD: agenda_password
      POSTGRES_DB: agenda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agenda_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenda_user -d agenda_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: agenda_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agenda.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - agenda_network
    restart: unless-stopped

  backend:
    build: .
    container_name: agenda_backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: agenda_user
      DB_PASSWORD: agenda_password
      DB_DATABASE: agenda_db
      JWT_SECRET: ${JWT_SECRET:-supersecretkeychangeinproduction}  # 👈 ADICIONAR
      JWT_EXPIRES_IN: 7d
      PORT: 4100
    ports:
      - "4100:4100"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agenda_network
    command: npm start
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  agenda_network:
    driver: bridge